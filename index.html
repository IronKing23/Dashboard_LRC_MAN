<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<meta name="theme-color" content="#7bbf8e">
<title>Painel de Manutenção Preventiva</title>
<style>
  :root{
    --verde:#8fca9f; --azul:#8ec5e0; --ambar:#e6bd77; --vermelho:#e29a9a;
    --roxo:#b9a9dd; --laranja:#eab188; --texto:#2f3a34; --texto2:#6f7c72;
    --borda:#e2e9e3; --fundo:#eef3ef; --card:#ffffff; --escuro:#2e7d4f;
    --sombra:0 4px 16px rgba(45,90,60,.08); --sombra2:0 2px 8px rgba(45,90,60,.06);
    --r:16px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html{scroll-behavior:smooth}
  body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--fundo);
       color:var(--texto);line-height:1.45;padding-bottom:40px;overflow-x:hidden}
  header{background:linear-gradient(125deg,#7bbf8e 0%,#84c5b8 55%,#8ec5e0 100%);
         color:#fff;padding:22px 0 30px;box-shadow:0 4px 20px rgba(0,0,0,.1);
         position:relative;overflow:hidden}
  header::after{content:"";position:absolute;right:-60px;top:-60px;width:200px;height:200px;
    background:rgba(255,255,255,.09);border-radius:50%}
  header::before{content:"";position:absolute;right:60px;bottom:-90px;width:150px;height:150px;
    background:rgba(255,255,255,.07);border-radius:50%}
  header h1{font-size:clamp(18px,4vw,24px);font-weight:800;letter-spacing:-.3px;position:relative}
  header .sub{font-size:13px;opacity:.94;margin-top:3px;position:relative}
  .wrap{max-width:1400px;margin:0 auto;padding:0 16px}

  /* filtros rápidos (chips) */
  .rapidos{display:flex;gap:8px;overflow-x:auto;padding:14px 16px 4px;margin:0 auto;
    max-width:1400px;-webkit-overflow-scrolling:touch;scrollbar-width:none}
  .rapidos::-webkit-scrollbar{display:none}
  .qchip{border:1.5px solid var(--borda);background:var(--card);color:var(--texto2);
    border-radius:22px;padding:9px 16px;font-size:13px;font-weight:700;cursor:pointer;
    white-space:nowrap;transition:.18s;flex-shrink:0;box-shadow:var(--sombra2)}
  .qchip:hover{border-color:var(--verde);color:var(--escuro)}
  .qchip.on{background:var(--escuro);color:#fff;border-color:var(--escuro);
    box-shadow:0 4px 12px rgba(46,125,79,.28)}

  /* card de filtros detalhados (recolhível no mobile) */
  .filtros-box{background:var(--card);border:1px solid var(--borda);border-radius:var(--r);
    margin:12px auto 0;max-width:1400px;box-shadow:var(--sombra);overflow:hidden}
  .filtros-head{display:flex;align-items:center;justify-content:space-between;
    padding:14px 18px;cursor:pointer;user-select:none}
  .filtros-head h3{font-size:14px;color:var(--texto);display:flex;gap:8px;align-items:center}
  .filtros-head .seta{transition:.25s;color:var(--texto2);font-size:13px}
  .filtros-box.aberto .filtros-head .seta{transform:rotate(180deg)}
  .filtros{display:flex;flex-wrap:wrap;gap:14px;align-items:flex-end;padding:0 18px 18px;
    max-height:0;opacity:0;overflow:hidden;transition:max-height .3s,opacity .25s,padding .3s}
  .filtros-box.aberto .filtros{max-height:600px;opacity:1}
  .campo{display:flex;flex-direction:column;gap:5px;flex:1;min-width:140px}
  .campo label{font-size:11px;font-weight:700;color:var(--texto2);
    text-transform:uppercase;letter-spacing:.03em}
  .campo select,.campo input{border:1.5px solid var(--borda);border-radius:10px;
    padding:9px 11px;font-size:14px;background:#fff;color:var(--texto);width:100%;
    transition:.15s;font-family:inherit}
  .campo select:focus,.campo input:focus{outline:none;border-color:var(--verde);
    box-shadow:0 0 0 3px rgba(143,202,159,.18)}
  .btn{border:none;border-radius:10px;padding:10px 18px;font-size:13px;font-weight:700;
    cursor:pointer;background:var(--escuro);color:#fff;transition:.15s;font-family:inherit}
  .btn:hover{filter:brightness(1.06)}
  .btn:active{transform:scale(.97)}
  .btn.sec{background:#eef2ee;color:var(--texto)}

  .periodo-label{font-size:12px;color:var(--texto2);text-align:center;margin:12px auto 0;
    max-width:1400px;font-weight:600}
  .periodo-label b{color:var(--escuro)}

  /* KPIs */
  .kpis{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));
    gap:12px;margin-top:16px}
  .kpi{background:var(--card);border:1px solid var(--borda);border-radius:var(--r);
    padding:16px 18px;box-shadow:var(--sombra2);position:relative;overflow:hidden;
    transition:.2s;cursor:default}
  .kpi:hover{transform:translateY(-2px);box-shadow:var(--sombra)}
  .kpi::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px;background:var(--verde)}
  .kpi.azul::before{background:var(--azul)} .kpi.laranja::before{background:var(--laranja)}
  .kpi.verm::before{background:var(--vermelho)} .kpi.roxo::before{background:var(--roxo)}
  .kpi .v{font-size:clamp(22px,5vw,30px);font-weight:800;color:var(--escuro);
    line-height:1;font-variant-numeric:tabular-nums}
  .kpi .r{font-size:12px;color:var(--texto2);margin-top:5px;font-weight:600}

  .grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:16px}
  @media(max-width:860px){.grid{grid-template-columns:1fr}}
  .painel{background:var(--card);border:1px solid var(--borda);border-radius:var(--r);
    padding:16px 18px;box-shadow:var(--sombra2);animation:sobe .4s ease both}
  @keyframes sobe{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
  .painel h3{font-size:14px;color:var(--texto);margin-bottom:14px;display:flex;
    align-items:center;gap:7px;flex-wrap:wrap}
  .painel h3 small{font-weight:400;color:var(--texto2);font-size:11.5px}
  .full{grid-column:1/-1}

  /* barras horizontais animadas */
  .barh{display:flex;flex-direction:column;gap:11px}
  .barh .row{display:grid;grid-template-columns:110px 1fr auto;align-items:center;gap:10px}
  @media(max-width:520px){.barh .row{grid-template-columns:88px 1fr;grid-template-rows:auto auto}
    .barh .val{grid-column:2;text-align:right;margin-top:-4px}}
  .barh .nome{font-size:12.5px;color:var(--texto);text-align:right;font-weight:600;
    overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .track{background:#eef2ee;border-radius:20px;height:20px;overflow:hidden;display:flex;
    box-shadow:inset 0 1px 2px rgba(0,0,0,.05)}
  .track > div{height:100%;transition:width .6s cubic-bezier(.4,1.3,.5,1);position:relative}
  .track > div:hover{filter:brightness(1.08)}
  .barh .val{font-size:12px;color:var(--texto);font-weight:700;white-space:nowrap;
    font-variant-numeric:tabular-nums}

  /* legendas */
  .legenda{display:flex;flex-wrap:wrap;gap:12px;margin-top:12px;font-size:12px}
  .legenda span{display:flex;align-items:center;gap:6px;font-weight:600;color:var(--texto2)}
  .sw{width:13px;height:13px;border-radius:4px;display:inline-block;flex-shrink:0}

  /* donut */
  .donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap;justify-content:center}
  .donut{position:relative;width:150px;height:150px;flex-shrink:0}
  .donut svg{transform:rotate(-90deg)}
  .donut .centro{position:absolute;inset:0;display:flex;flex-direction:column;
    align-items:center;justify-content:center}
  .donut .centro .n{font-size:26px;font-weight:800;color:var(--escuro);line-height:1}
  .donut .centro .l{font-size:10.5px;color:var(--texto2);margin-top:2px}
  .donut circle{transition:stroke-dasharray .7s cubic-bezier(.4,1,.5,1)}

  /* tabela */
  .tabtop{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}
  .count{font-size:12px;color:var(--texto2);font-weight:600}
  .tabwrap{max-height:520px;overflow:auto;border:1px solid var(--borda);border-radius:12px;
    margin-top:6px;-webkit-overflow-scrolling:touch}
  table{width:100%;border-collapse:collapse;font-size:13px}
  th,td{padding:9px 11px;text-align:left;border-bottom:1px solid var(--borda);white-space:nowrap}
  th{background:var(--escuro);color:#fff;cursor:pointer;position:sticky;top:0;z-index:2;
    font-size:11px;text-transform:uppercase;letter-spacing:.03em;user-select:none}
  th:hover{background:#35935c}
  tbody tr{transition:.1s}
  tbody tr:nth-child(even){background:#f7faf8}
  tbody tr:hover{background:#eef7f1}
  .chip{display:inline-block;padding:3px 11px;border-radius:20px;font-size:11px;
    font-weight:700;color:#22302a}
  .cards-mob{display:none}

  /* MOBILE: tabela vira cards */
  @media(max-width:600px){
    .tabwrap{display:none}
    .cards-mob{display:flex;flex-direction:column;gap:10px;max-height:600px;overflow:auto;
      margin-top:8px;-webkit-overflow-scrolling:touch}
    .cardp{border:1px solid var(--borda);border-radius:12px;padding:12px 14px;background:#fff;
      box-shadow:var(--sombra2)}
    .cardp .lin1{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-bottom:6px}
    .cardp .frota{font-weight:800;font-size:15px;color:var(--texto)}
    .cardp .meta{font-size:12px;color:var(--texto2);display:grid;grid-template-columns:1fr 1fr;
      gap:3px 10px}
    .cardp .meta b{color:var(--texto);font-weight:600}
    .ordena-mob{display:flex;gap:8px;align-items:center;margin-top:8px}
    .ordena-mob select{border:1.5px solid var(--borda);border-radius:8px;padding:7px 10px;font-size:13px;flex:1}
  }
  @media(min-width:601px){.ordena-mob{display:none}}

  .vazio{color:var(--texto2);font-style:italic;padding:26px;text-align:center;font-size:13px}
  .foot{text-align:center;color:var(--texto2);font-size:11px;margin-top:26px;padding:0 16px}
  .tip{cursor:help;border-bottom:1px dotted var(--texto2)}

  /* tooltip flutuante */
  #tt{position:fixed;background:#2f3a34;color:#fff;padding:6px 10px;border-radius:8px;
    font-size:12px;font-weight:600;pointer-events:none;opacity:0;transition:opacity .12s;
    z-index:99;box-shadow:0 4px 14px rgba(0,0,0,.25);white-space:nowrap}
</style>
</head>
<body>
<header>
  <div class="wrap">
    <h1>🚜 Painel de Manutenção Preventiva</h1>
    <div class="sub" id="sub"></div>
  </div>
</header>

<!-- filtros rápidos -->
<div class="rapidos" id="rapidos">
  <button class="qchip" data-p="tudo">📅 Tudo</button>
  <button class="qchip" data-p="semana">Esta semana</button>
  <button class="qchip" data-p="semana-1">Semana passada</button>
  <button class="qchip" data-p="mes">Este mês</button>
  <button class="qchip" data-p="mes-1">Mês passado</button>
  <button class="qchip" data-p="90">Últimos 90 dias</button>
  <button class="qchip" data-p="ano">Este ano</button>
</div>

<div class="wrap">
  <div class="periodo-label" id="periodo_label"></div>

  <!-- filtros detalhados recolhíveis -->
  <div class="filtros-box" id="fbox">
    <div class="filtros-head" id="fhead">
      <h3>⚙️ Filtros detalhados <small style="font-weight:400;color:var(--texto2)" id="fresumo"></small></h3>
      <span class="seta">▼</span>
    </div>
    <div class="filtros">
      <div class="campo"><label>Período (de)</label><input type="date" id="f_de"></div>
      <div class="campo"><label>Período (até)</label><input type="date" id="f_ate"></div>
      <div class="campo"><label>Plano</label><select id="f_plano"></select></div>
      <div class="campo"><label>Setor</label><select id="f_setor"></select></div>
      <div class="campo"><label>Conjunto / Frota</label><select id="f_conj"></select></div>
      <div class="campo"><label>Situação</label><select id="f_sit"></select></div>
      <div class="campo"><label>Busca (frota / OS)</label><input type="text" id="f_busca" placeholder="ex.: 41570"></div>
      <button class="btn sec" id="limpar">Limpar tudo</button>
    </div>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="grid">
    <div class="painel">
      <h3>🎯 Aderência ao cronograma</h3>
      <div class="donut-wrap">
        <div class="donut" id="donut"></div>
        <div class="legenda" id="leg_donut" style="flex-direction:column;gap:8px"></div>
      </div>
    </div>
    <div class="painel">
      <h3>📊 Situação das preventivas</h3>
      <div id="g_situacao"></div>
      <div class="legenda" id="leg_situacao"></div>
    </div>
    <div class="painel">
      <h3>🏭 Aderência por setor <small>no prazo ÷ vencidas</small></h3>
      <div class="barh" id="g_setor"></div>
    </div>
    <div class="painel">
      <h3>📈 Concluídas por mês</h3>
      <div id="g_mensal"></div>
    </div>
    <div class="painel full">
      <h3>🚜 Desempenho por conjunto / frota <small>% do total agendado</small></h3>
      <div class="legenda" style="margin-bottom:12px">
        <span><i class="sw" style="background:var(--verde)"></i>No prazo</span>
        <span><i class="sw" style="background:var(--laranja)"></i>Fora do prazo</span>
        <span><i class="sw" style="background:var(--vermelho)"></i>Em atraso</span>
        <span><i class="sw" style="background:#eef2ee"></i>A executar</span>
      </div>
      <div class="barh" id="g_conjunto"></div>
    </div>
  </div>

  <div class="painel full" style="margin-top:16px">
    <div class="tabtop">
      <h3 style="margin:0">📋 Preventivas <span id="tab_count" class="count"></span></h3>
      <button class="btn sec" id="csv">⬇ Exportar CSV</button>
    </div>
    <div class="ordena-mob">
      <label style="font-size:12px;color:var(--texto2);font-weight:700">Ordenar:</label>
      <select id="ord_mob"></select>
    </div>
    <div class="tabwrap">
      <table id="tabela"><thead><tr id="thead"></tr></thead><tbody id="tbody"></tbody></table>
    </div>
    <div class="cards-mob" id="cards_mob"></div>
  </div>

  <div class="foot" id="foot"></div>
</div>

<div id="tt"></div>

const CORES_SIT = {
  "Aderente": C.ADERENTE, "Não aderente": C.NAO_ADERENTE,
  "Em atraso": C.EM_ATRASO, "Agendada": C.AGENDADA, "Andamento": C.ANDAMENTO
};
const COLS = [
  ["frota","Frota"],["modelo","Modelo"],["conjunto","Conjunto"],["setor","Setor"],
  ["plano","Plano"],["prevista","Prevista"],["conclusao","Conclusão"],
  ["situacao","Situação"],["os","OS"],["executor","Executor"]
];
let ordem = {col:"prevista", dir:1};
const $ = id => document.getElementById(id);

$("sub").textContent = DADOS.org + " · gerado em " + DADOS.gerado_em + " · " + DADOS.preventivas.length + " preventivas";
$("foot").textContent = "Gerado pelo Gestor de Frotas · dados de " + DADOS.gerado_em + " · painel offline para servidor privado";

function unicos(campo){return [...new Set(DADOS.preventivas.map(p=>p[campo]).filter(Boolean))].sort();}
function opt(sel, vals, todos){$(sel).innerHTML='<option value="">'+todos+'</option>'+vals.map(v=>'<option>'+v+'</option>').join("");}
function fmtBR(iso){if(!iso)return "—";const p=iso.split("-");return p[2]+"/"+p[1]+"/"+p[0];}
function iso(d){return d.toISOString().slice(0,10);}

opt("f_plano", unicos("plano"), "Todos os planos");
opt("f_setor", unicos("setor"), "Todos os setores");
opt("f_conj", unicos("conjunto"), "Todos os conjuntos");
opt("f_sit", unicos("situacao"), "Todas as situações");
$("ord_mob").innerHTML = COLS.map(c=>'<option value="'+c[0]+'">'+c[1]+'</option>').join("");
$("ord_mob").value = "prevista";

// ---- filtros rápidos de período ----
function segunda(d){const x=new Date(d);const dia=(x.getDay()+6)%7;x.setDate(x.getDate()-dia);x.setHours(0,0,0,0);return x;}
function aplicarRapido(p){
  const hoje=new Date(DADOS.hoje+"T00:00:00");
  let de="", ate="";
  if(p==="tudo"){de="";ate="";}
  else if(p==="semana"){const s=segunda(hoje);const f=new Date(s);f.setDate(f.getDate()+6);de=iso(s);ate=iso(f);}
  else if(p==="semana-1"){const s=segunda(hoje);s.setDate(s.getDate()-7);const f=new Date(s);f.setDate(f.getDate()+6);de=iso(s);ate=iso(f);}
  else if(p==="mes"){de=iso(new Date(hoje.getFullYear(),hoje.getMonth(),1));ate=iso(new Date(hoje.getFullYear(),hoje.getMonth()+1,0));}
  else if(p==="mes-1"){de=iso(new Date(hoje.getFullYear(),hoje.getMonth()-1,1));ate=iso(new Date(hoje.getFullYear(),hoje.getMonth(),0));}
  else if(p==="90"){const s=new Date(hoje);s.setDate(s.getDate()-89);de=iso(s);ate=iso(hoje);}
  else if(p==="ano"){de=iso(new Date(hoje.getFullYear(),0,1));ate=iso(new Date(hoje.getFullYear(),11,31));}
  $("f_de").value=de; $("f_ate").value=ate;
  document.querySelectorAll(".qchip").forEach(c=>c.classList.toggle("on", c.dataset.p===p));
  render();
}
document.querySelectorAll(".qchip").forEach(c=>c.onclick=()=>aplicarRapido(c.dataset.p));

// filtros detalhados: recolhível
$("fhead").onclick=()=>$("fbox").classList.toggle("aberto");

function filtrar(){
  const de=$("f_de").value, ate=$("f_ate").value, plano=$("f_plano").value,
        setor=$("f_setor").value, conj=$("f_conj").value, sit=$("f_sit").value,
        busca=$("f_busca").value.toLowerCase().trim();
  return DADOS.preventivas.filter(p=>{
    if(de && (!p.prevista || p.prevista<de)) return false;
    if(ate && (!p.prevista || p.prevista>ate)) return false;
    if(plano && p.plano!==plano) return false;
    if(setor && p.setor!==setor) return false;
    if(conj && p.conjunto!==conj) return false;
    if(sit && p.situacao!==sit) return false;
    if(busca && !((p.frota||"").toLowerCase().includes(busca)||(p.os||"").toLowerCase().includes(busca))) return false;
    return true;
  });
}

function contarAtivos(){
  let n=0;
  ["f_de","f_ate","f_plano","f_setor","f_conj","f_sit","f_busca"].forEach(i=>{if($(i).value)n++;});
  return n;
}

// ---- tooltip flutuante ----
const tt=$("tt");
function bindTip(el,txt){
  el.addEventListener("mouseenter",e=>{tt.textContent=txt;tt.style.opacity=1;});
  el.addEventListener("mousemove",e=>{tt.style.left=(e.clientX+12)+"px";tt.style.top=(e.clientY-8)+"px";});
  el.addEventListener("mouseleave",()=>tt.style.opacity=0);
}

function kpis(rows){
  const total=rows.length;
  const feitas=rows.filter(r=>r.situacao_cod==="aderente"||r.situacao_cod==="nao_aderente").length;
  const ader=rows.filter(r=>r.situacao_cod==="aderente").length;
  const atraso=rows.filter(r=>r.situacao_cod==="em_atraso").length;
  const venc=feitas+atraso;
  const adPct=venc?Math.round(100*ader/venc):0;
  const exPct=total?Math.round(100*feitas/total):0;
  const cards=[
    ["Preventivas",total,""],["Executadas",feitas,"azul"],["Execução",exPct+"%","azul"],
    ["No prazo",ader,""],["Em atraso",atraso,"verm"],["Aderência",adPct+"%","roxo"]
  ];
  $("kpis").innerHTML=cards.map(c=>'<div class="kpi '+c[2]+'"><div class="v">'+c[1]+'</div><div class="r">'+c[0]+'</div></div>').join("");
  return {total,feitas,ader,atraso,venc,adPct};
}

function donut(k){
  const naoAder=k.feitas-k.ader, atraso=k.atraso;
  const partes=[["No prazo",k.ader,C.ADERENTE],["Fora do prazo",naoAder,C.NAO_ADERENTE],["Em atraso",atraso,C.EM_ATRASO]];
  const soma=k.ader+naoAder+atraso || 1;
  const R=62, CIRC=2*Math.PI*R;
  let off=0, arcos="";
  partes.forEach(p=>{
    if(p[1]<=0)return;
    const frac=p[1]/soma, len=frac*CIRC;
    arcos+='<circle cx="75" cy="75" r="'+R+'" fill="none" stroke="'+p[2]+'" stroke-width="20" '+
      'stroke-dasharray="'+len+' '+(CIRC-len)+'" stroke-dashoffset="'+(-off)+'"/>';
    off+=len;
  });
  $("donut").innerHTML='<svg viewBox="0 0 150 150" width="150" height="150">'+
    '<circle cx="75" cy="75" r="'+R+'" fill="none" stroke="#eef2ee" stroke-width="20"/>'+arcos+'</svg>'+
    '<div class="centro"><div class="n">'+k.adPct+'%</div><div class="l">aderência</div></div>';
  $("leg_donut").innerHTML=partes.map(p=>
    '<span><i class="sw" style="background:'+p[2]+'"></i>'+p[0]+' <b style="margin-left:4px;color:var(--texto)">'+p[1]+'</b></span>').join("");
}

function gSituacao(rows){
  const cont={};rows.forEach(r=>cont[r.situacao]=(cont[r.situacao]||0)+1);
  const total=rows.length||1;
  const ord=["Aderente","Não aderente","Em atraso","Andamento","Agendada"];
  const itens=ord.filter(k=>cont[k]);
  if(!itens.length){$("g_situacao").innerHTML='<div class="vazio">Sem dados no filtro</div>';$("leg_situacao").innerHTML="";return;}
  let h='<div class="track" style="height:30px">';
  itens.forEach(k=>{const pct=100*cont[k]/total;h+='<div data-tip="'+k+': '+cont[k]+' ('+Math.round(pct)+'%)" style="width:'+pct+'%;background:'+(CORES_SIT[k]||"#ccc")+'"></div>';});
  h+='</div>';
  $("g_situacao").innerHTML=h;
  $("g_situacao").querySelectorAll("[data-tip]").forEach(d=>bindTip(d,d.dataset.tip));
  $("leg_situacao").innerHTML=itens.map(k=>'<span><i class="sw" style="background:'+(CORES_SIT[k]||"#ccc")+'"></i>'+k+' ('+cont[k]+')</span>').join("");
}

function gSetor(rows){
  const m={};
  rows.forEach(r=>{const s=r.setor;if(!m[s])m[s]={ader:0,venc:0};
    if(r.situacao_cod==="aderente"){m[s].ader++;m[s].venc++;}
    else if(r.situacao_cod==="nao_aderente"||r.situacao_cod==="em_atraso")m[s].venc++;});
  const arr=Object.entries(m).map(([s,v])=>({s,pct:v.venc?Math.round(100*v.ader/v.venc):0,ader:v.ader,venc:v.venc}))
    .filter(x=>x.venc>0).sort((a,b)=>b.pct-a.pct);
  if(!arr.length){$("g_setor").innerHTML='<div class="vazio">Sem preventivas vencidas no filtro</div>';return;}
  const cores=[C.ADERENTE,C.AGENDADA,C.ANDAMENTO,C.NAO_ADERENTE,C.EM_ATRASO];
  $("g_setor").innerHTML=arr.map((x,i)=>
    '<div class="row"><div class="nome" title="'+x.s+'">'+x.s+'</div>'+
    '<div class="track"><div data-tip="'+x.s+': '+x.pct+'% ('+x.ader+'/'+x.venc+')" style="width:0;background:'+cores[i%cores.length]+'"></div></div>'+
    '<div class="val">'+x.pct+'% <span style="color:var(--texto2);font-weight:600">('+x.ader+'/'+x.venc+')</span></div></div>').join("");
  requestAnimationFrame(()=>{$("g_setor").querySelectorAll(".track>div").forEach((d,i)=>{d.style.width=Math.max(arr[i].pct,2)+"%";bindTip(d,d.dataset.tip);});});
}

function gConjunto(rows){
  const m={};
  rows.forEach(r=>{const c=r.conjunto;if(!m[c])m[c]={ad:0,na:0,at:0,tot:0};m[c].tot++;
    if(r.situacao_cod==="aderente")m[c].ad++;else if(r.situacao_cod==="nao_aderente")m[c].na++;
    else if(r.situacao_cod==="em_atraso")m[c].at++;});
  let arr=Object.entries(m).map(([c,v])=>({c,...v,exec:v.tot?Math.round(100*(v.ad+v.na)/v.tot):0}))
    .filter(x=>x.ad+x.na>0||x.at>0).sort((a,b)=>b.exec-a.exec).slice(0,25);
  if(!arr.length){$("g_conjunto").innerHTML='<div class="vazio">Sem dados no filtro</div>';return;}
  $("g_conjunto").innerHTML=arr.map(x=>{
    const pa=100*x.ad/x.tot,pn=100*x.na/x.tot,pt=100*x.at/x.tot;
    return '<div class="row"><div class="nome" title="'+x.c+'">'+x.c+'</div>'+
      '<div class="track">'+
        (pa>0?'<div data-tip="No prazo: '+x.ad+'" style="width:0" data-w="'+pa+'" data-bg="'+C.ADERENTE+'"></div>':'')+
        (pn>0?'<div data-tip="Fora do prazo: '+x.na+'" style="width:0" data-w="'+pn+'" data-bg="'+C.NAO_ADERENTE+'"></div>':'')+
        (pt>0?'<div data-tip="Em atraso: '+x.at+'" style="width:0" data-w="'+pt+'" data-bg="'+C.EM_ATRASO+'"></div>':'')+
      '</div>'+
      '<div class="val">'+x.exec+'% <span style="color:var(--texto2);font-weight:600">('+(x.ad+x.na)+'/'+x.tot+')</span>'+(x.at?' <span style="color:'+C.EM_ATRASO+'">⚠'+x.at+'</span>':'')+'</div></div>';
  }).join("");
  requestAnimationFrame(()=>{$("g_conjunto").querySelectorAll(".track>div").forEach(d=>{d.style.background=d.dataset.bg;d.style.width=d.dataset.w+"%";bindTip(d,d.dataset.tip);});});
}

function gMensal(rows){
  const m={};rows.filter(r=>r.conclusao).forEach(r=>{const mes=r.conclusao.slice(0,7);m[mes]=(m[mes]||0)+1;});
  const meses=Object.keys(m).sort();
  if(!meses.length){$("g_mensal").innerHTML='<div class="vazio">Nenhuma preventiva concluída no filtro</div>';return;}
  const max=Math.max(...Object.values(m)),W=Math.max(300,meses.length*64),H=170,pad=26;
  const bw=Math.min(38,(W-2*pad)/meses.length*0.55);
  let bars="",labels="";
  meses.forEach((mes,i)=>{
    const x=pad+i*((W-2*pad)/meses.length)+((W-2*pad)/meses.length)/2;
    const h=(m[mes]/max)*(H-52);
    bars+='<rect x="'+(x-bw/2)+'" y="'+(H-28)+'" width="'+bw+'" height="0" rx="6" fill="'+C.AZUL+'" data-tip="'+mes+': '+m[mes]+'"><animate attributeName="height" to="'+h+'" dur="0.7s" fill="freeze" calcMode="spline" keySplines="0.3 1 0.4 1" keyTimes="0;1" values="0;'+h+'"/><animate attributeName="y" to="'+(H-28-h)+'" dur="0.7s" fill="freeze" calcMode="spline" keySplines="0.3 1 0.4 1" keyTimes="0;1" values="'+(H-28)+';'+(H-28-h)+'"/></rect>';
    bars+='<text x="'+x+'" y="'+(H-32-h)+'" text-anchor="middle" font-size="12" font-weight="800" fill="#2f3a34" opacity="0"><animate attributeName="opacity" to="1" dur="0.4s" begin="0.5s" fill="freeze"/>'+m[mes]+'</text>';
    const[yy,mm]=mes.split("-");
    labels+='<text x="'+x+'" y="'+(H-10)+'" text-anchor="middle" font-size="10.5" fill="#6f7c72">'+mm+'/'+yy.slice(2)+'</text>';
  });
  $("g_mensal").innerHTML='<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:auto;max-height:200px">'+bars+labels+'</svg>';
  $("g_mensal").querySelectorAll("[data-tip]").forEach(d=>bindTip(d,d.dataset.tip.replace(/(\d{4})-(\d{2})/,"$2/$1")));
}

function linhasCard(r){
  return '<div class="cardp"><div class="lin1"><span class="frota">🚜 '+(r.frota||"—")+'</span>'+
    '<span class="chip" style="background:'+(CORES_SIT[r.situacao]||"#ccc")+'">'+r.situacao+'</span></div>'+
    '<div class="meta"><span>Conjunto: <b>'+r.conjunto+'</b></span><span>Plano: <b>'+r.plano+'</b></span>'+
    '<span>Setor: <b>'+r.setor+'</b></span><span>Prevista: <b>'+fmtBR(r.prevista)+'</b></span>'+
    (r.conclusao?'<span>Concluída: <b>'+fmtBR(r.conclusao)+'</b></span>':'')+
    (r.os?'<span>OS: <b>'+r.os+'</b></span>':'')+'</div></div>';
}

function tabela(rows){
  const th=$("thead");
  th.innerHTML=COLS.map(c=>'<th data-col="'+c[0]+'">'+c[1]+(ordem.col===c[0]?(ordem.dir>0?' ▲':' ▼'):'')+'</th>').join("");
  th.querySelectorAll("th").forEach(t=>t.onclick=()=>{const c=t.dataset.col;if(ordem.col===c)ordem.dir*=-1;else{ordem.col=c;ordem.dir=1;}render();});
  const sorted=[...rows].sort((a,b)=>{const va=a[ordem.col]||"",vb=b[ordem.col]||"";return va>vb?ordem.dir:va<vb?-ordem.dir:0;});
  $("tbody").innerHTML=sorted.map(r=>'<tr>'+COLS.map(c=>{
    if(c[0]==="situacao")return '<td><span class="chip" style="background:'+(CORES_SIT[r.situacao]||"#ccc")+'">'+r.situacao+'</span></td>';
    if(c[0]==="prevista"||c[0]==="conclusao")return '<td>'+fmtBR(r[c[0]])+'</td>';
    return '<td>'+(r[c[0]]||"—")+'</td>';}).join("")+'</tr>').join("");
  $("cards_mob").innerHTML=sorted.map(linhasCard).join("");
  $("tab_count").textContent="("+rows.length+" registros)";
}

$("ord_mob").onchange=e=>{ordem.col=e.target.value;ordem.dir=1;render();};

function baixarCSV(rows){
  const head=COLS.map(c=>c[1]).join(";");
  const linhas=rows.map(r=>COLS.map(c=>{let v=r[c[0]]||"";if(c[0]==="prevista"||c[0]==="conclusao")v=fmtBR(v);return '"'+String(v).replace(/"/g,'""')+'"';}).join(";"));
  const blob=new Blob(["\ufeff"+head+"\n"+linhas.join("\n")],{type:"text/csv;charset=utf-8"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="preventivas_"+DADOS.hoje+".csv";a.click();
}
$("csv").onclick=()=>baixarCSV(filtrar());

function periodoLabel(){
  const de=$("f_de").value,ate=$("f_ate").value;
  if(!de&&!ate){$("periodo_label").innerHTML="Exibindo <b>todo o histórico</b>";return;}
  $("periodo_label").innerHTML="Período: <b>"+(de?fmtBR(de):"início")+"</b> até <b>"+(ate?fmtBR(ate):"hoje")+"</b>";
}

function render(){
  const rows=filtrar();
  const k=kpis(rows);
  donut(k); gSituacao(rows); gSetor(rows); gConjunto(rows); gMensal(rows); tabela(rows);
  periodoLabel();
  const n=contarAtivos();
  $("fresumo").textContent = n? "("+n+" ativo"+(n>1?"s":"")+")" : "";
}

document.querySelectorAll("#fbox select,#fbox input").forEach(e=>{
  e.addEventListener("input",()=>{document.querySelectorAll(".qchip").forEach(c=>c.classList.remove("on"));render();});
});
$("limpar").onclick=()=>{document.querySelectorAll("#fbox select,#fbox input").forEach(e=>e.value="");document.querySelectorAll(".qchip").forEach(c=>c.classList.remove("on"));render();};

render();
</script>
